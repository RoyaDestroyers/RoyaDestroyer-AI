name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 30 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Deploy over SSH
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          STACK_ENV_FILE: ${{ secrets.STACK_ENV_FILE }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -o StrictHostKeyChecking=no -p "$PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "bash -lc '
            set -euo pipefail
            cd \"${DEPLOY_ROOT}/repos/roya-destroyers-backend\"
            STACK_ENV_FILE=\"${STACK_ENV_FILE}\" \
            STACK_BRANCH=main \
            bash deploy/scripts/deploy-stack.sh
          '"
